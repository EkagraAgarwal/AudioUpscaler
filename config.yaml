# Audio Upscaler Configuration
# Optimized for AMD RX 7700S (ROCm 6.3)
# Based on benchmark results - see OPTIMIZATION_RESULTS.md

# Model Architecture
model:
  name: "unet1d"
  channels: [64, 128, 256, 512, 512]
  bottleneck_channels: 1024
  kernel_size: 7
  num_layers: 5
  dropout: 0.1
  activation: "leaky_relu"
  use_attention: false

# Audio Settings
audio:
  sample_rate: 44100
  channels: 1  # Mono (optimal for training speed)
  audio_length: 32768  # ~0.75 seconds - optimal for RX 7700S
  n_fft: 2048
  hop_length: 512

# Training Settings (Optimized based on benchmarks)
training:
  batch_size: 8  # Optimal for 8GB VRAM
  epochs: 50
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  mixed_precision: false  # Disabled - ROCm incompatible
  gradient_checkpointing: false
  num_workers: 4  # Optimal for 16-core CPU
  pin_memory: true
  use_memmap: true  # Memory-mapped WAV for 15-20% speedup
  wav_dir: "data/wav_cache"  # Pre-converted WAV files

# Optimizer
optimizer: "adamw"
betas: [0.9, 0.999]

# Scheduler
scheduler: "cosine"
warmup_epochs: 5
min_lr: 1.0e-6

# Loss Function (3 resolutions is optimal)
loss:
  l1_weight: 1.0
  stft_weight: 1.0
  stft_scales: [512, 1024, 2048]  # Keep 3 scales - reducing provides <1% speedup

# Data Settings
data:
  raw_dir: "data/raw"
  compressed_dir: "data/compressed"
  checkpoint_dir: "data/checkpoints"

  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Compression bitrates to train on
bitrates: [128, 192]

# Augmentation
augment: true
volume_perturbation: 6.0  # dB

seed: 42

# Validation
validation:
  every_n_epochs: 1
  num_samples: 10
  save_audio: true

# Checkpointing
checkpoint:
  save_every: 5
  keep_last: 3
  save_best: true

# Logging
logging:
  log_dir: "runs"
  log_every: 100
  use_tensorboard: true

# Inference
inference:
  overlap: 0.5  # Overlap between chunks
  batch_size: 1

# Performance Notes:
# - Memory-mapped WAV provides 15-20% speedup
# - batch_size=8 is optimal (larger is slower)
# - num_workers=4 is optimal (more adds overhead)
# - Mixed precision not supported on ROCm 6.3
# - Current speed: ~3.5-4.0 min/epoch
# - Estimated training time: 3.0-3.5 hours (50 epochs)
